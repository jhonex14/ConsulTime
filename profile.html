<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile - ConsulTime</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e3a8a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        body { background-color: #f8fafc; font-family: 'Outfit', sans-serif; }

        .back-btn-top {
            display: inline-flex;
            align-items: center;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 600;
            padding: 0.5rem 1.1rem;
            border-radius: 2rem;
            border: 1px solid #e2e8f0;
            background: #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.02);
            transition: all 0.2s ease;
        }
        .back-btn-top:hover {
            color: #2563eb;
            border-color: #2563eb;
            transform: translateX(-3px);
            background: rgba(37,99,235,0.02);
        }

        .avatar-wrapper {
            position: relative;
            display: inline-block;
        }
        .avatar-circle {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 4px solid rgba(255,255,255,0.9);
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.15), 0 8px 10px -6px rgba(0,0,0,0.15);
            object-fit: cover;
            background: linear-gradient(135deg, #2563eb, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            font-weight: 700;
            color: #fff;
            overflow: hidden;
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .avatar-circle:hover {
            transform: scale(1.04);
        }
        .avatar-upload-btn {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: #2563eb;
            border: 3px solid #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
            z-index: 5;
        }
        .avatar-upload-btn:hover { background: #1d4ed8; transform: scale(1.1); }
        .avatar-upload-btn i { color: #fff; font-size: 11px; }

        .profile-card {
            border-radius: 1.25rem !important;
            border: 1px solid rgba(226, 232, 240, 0.8) !important;
            box-shadow: 0 10px 30px -10px rgba(15, 23, 42, 0.03), 0 1px 3px rgba(15, 23, 42, 0.01) !important;
            background: #ffffff;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .profile-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 20px 40px -15px rgba(15, 23, 42, 0.06), 0 1px 4px rgba(15, 23, 42, 0.02) !important;
        }
        
        .info-row {
            display: flex;
            align-items: center;
            padding: 1.1rem 0;
            border-bottom: 1px solid #f1f5f9;
            gap: 16px;
            transition: background-color 0.2s;
        }
        .info-row:last-child { border-bottom: none; }
        .info-icon {
            width: 40px; height: 40px;
            border-radius: 12px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all 0.25s ease;
        }
        .info-icon i { color: #64748b; font-size: 14px; transition: color 0.25s ease; }
        .info-row:hover .info-icon {
            background: rgba(37, 99, 235, 0.05);
            border-color: rgba(37, 99, 235, 0.2);
            transform: scale(1.05);
        }
        .info-row:hover .info-icon i {
            color: #2563eb;
        }
        .info-label { 
            font-size: 11px; 
            color: #94a3b8; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 0.08em; 
            margin-bottom: 2px; 
        }
        .info-value { font-size: 14px; font-weight: 600; color: #1e293b; }

        .section-title {
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: #64748b;
            margin-bottom: 1.25rem;
        }
        .role-badge {
            padding: 0.35rem 1rem !important;
            border-radius: 2rem;
            font-size: 10px !important;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid rgba(255,255,255,0.2) !important;
            background: rgba(255,255,255,0.1) !important;
            backdrop-filter: blur(4px);
        }
        .toast-msg {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 9999;
            min-width: 280px;
        }

        /* Timeline styling */
        .timeline-container {
            position: relative;
            padding: 5px 0;
        }
        .timeline-container::before {
            content: '';
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 20px;
            width: 2px;
            background: #e2e8f0;
        }
        .timeline-item {
            position: relative;
            padding-left: 45px;
            margin-bottom: 1.5rem;
        }
        .timeline-item:last-child {
            margin-bottom: 0;
        }
        .timeline-icon {
            position: absolute;
            left: 8px;
            top: 2px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            z-index: 2;
            border: 2px solid #fff;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        .timeline-item.approved .timeline-icon { background-color: #3b82f6; color: #fff; }
        .timeline-item.completed .timeline-icon { background-color: #10b981; color: #fff; }
        .timeline-item.pending .timeline-icon { background-color: #f59e0b; color: #fff; }
        .timeline-item.rejected .timeline-icon { background-color: #ef4444; color: #fff; }
        
        .timeline-content {
            background: #f8fafc;
            border-radius: 0.75rem;
            padding: 0.85rem 1rem;
            border: 1px solid #f1f5f9;
        }
        .timeline-time {
            font-size: 11px;
            color: #94a3b8;
            font-weight: 500;
        }

        @media print {
            body {
                background: #fff !important;
                color: #000 !important;
            }
            #backToDashboard, .col-lg-7, .avatar-upload-btn, .toast-msg {
                display: none !important;
            }
            .profile-hero {
                background: none !important;
                padding: 0 !important;
                border: none !important;
            }
            .profile-hero-bg {
                display: none !important;
            }
            .container {
                width: 100% !important;
                max-width: 100% !important;
                padding: 0 !important;
                margin: 0 !important;
            }
            .row {
                display: flex !important;
                justify-content: center !important;
            }
            .col-lg-5 {
                width: 100% !important;
                max-width: 450px !important;
            }
            .profile-card {
                border: 2px solid #1e3a8a !important;
                box-shadow: none !important;
                page-break-inside: avoid;
            }
            .avatar-circle {
                border-color: #1e3a8a !important;
            }
            .text-white {
                color: #000 !important;
            }
            .info-icon {
                background: none !important;
                border: 1px solid #e2e8f0 !important;
            }
            .info-icon i {
                color: #000 !important;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Container -->
    <div class="container pt-4">
        <!-- Back Button -->
        <a href="#" id="backToDashboard" class="back-btn-top">
            <i class="fa-solid fa-arrow-left me-2"></i> Back to Dashboard
        </a>
    </div>

    <!-- Main Content -->
    <div class="container py-4 mt-2">
        <div class="row g-4 justify-content-center">
            
            <!-- LEFT: Custom Profile Card (col-lg-5) -->
            <div class="col-lg-5">
                <div class="card custom-profile-card p-0 overflow-hidden shadow-sm border-0" style="border-radius: 1.5rem; background: #fff; border: 1px solid rgba(226, 232, 240, 0.8) !important;">
                    <!-- Blue Header Band -->
                    <div class="custom-card-header bg-primary-dark" style="height: 100px; background: linear-gradient(135deg, #1e3b5c 0%, #1e3a8a 100%); border-top-left-radius: 1.5rem; border-top-right-radius: 1.5rem;"></div>
                    
                    <!-- Profile Card Body -->
                    <div class="p-4 text-center">
                        <!-- Avatar Wrapper -->
                        <div class="avatar-wrapper-custom" style="margin-top: -65px; margin-bottom: 15px; display: inline-block; position: relative;">
                            <div class="avatar-circle" id="profileAvatarInitials" style="width: 100px; height: 100px; border-radius: 50%; border: 4px solid #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.1); font-size: 32px; font-weight: 700; color: #fff; background: linear-gradient(135deg, #2563eb, #1d4ed8); overflow: hidden; display: flex; align-items: center; justify-content: center; margin: 0 auto;">
                                <img id="profileAvatarPreview" src="" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
                                <span id="profileInitialsText">JO</span>
                            </div>
                            <label for="avatarUpload" class="avatar-upload-btn" title="Change photo" style="width: 28px; height: 28px; bottom: 0; right: 0; position: absolute; background: #2563eb; border: 2px solid #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.15);">
                                <i class="fa-solid fa-camera" style="font-size: 10px; color: #fff;"></i>
                            </label>
                            <input type="file" id="avatarUpload" class="d-none" accept="image/*">
                        </div>
                        
                        <!-- User Details -->
                        <h4 class="fw-bold text-dark mb-1" id="heroName" style="font-size: 20px;">Jeffrey Oñas</h4>
                        <p class="text-muted mb-3" id="heroEmail" style="font-size: 13px;">jhonexsapalicio70@gmail.com</p>
                        
                        <!-- Dummy hidden email to support app.js without runtime errors -->
                        <span id="infoEmail" style="display:none;"></span>

                        <!-- Role Badge Pill -->
                        <div class="role-badge-pill mb-4" id="heroBadge" style="width: 100%; padding: 8px 0; background-color: #10b981; border-radius: 20px; color: #fff; font-weight: 700; text-align: center; text-transform: uppercase; font-size: 12px; letter-spacing: 0.5px;">FACULTY</div>
                        
                        <!-- Divider -->
                        <hr class="text-muted opacity-25 my-3">
                        
                        <!-- Key-Value Fields -->
                        <div class="custom-fields text-start px-2">
                            <div class="d-flex align-items-center py-2 border-bottom" style="border-bottom-color: #f1f5f9 !important;">
                                <i class="fa-solid fa-id-badge text-primary me-3" style="width: 16px; color: #2563eb !important;"></i>
                                <span class="text-muted me-2" style="font-size: 13px; width: 60px;">ID:</span>
                                <span class="fw-bold text-dark" id="infoIdNumber" style="font-size: 14px;">00011662</span>
                            </div>
                            <div class="d-flex align-items-center py-2 border-bottom" style="border-bottom-color: #f1f5f9 !important;">
                                <i class="fa-solid fa-graduation-cap text-primary me-3" style="width: 16px; color: #2563eb !important;"></i>
                                <span class="text-muted me-2" style="font-size: 13px; width: 60px;">Dept:</span>
                                <span class="fw-bold text-dark" id="infoDept" style="font-size: 14px;">DHRT Department</span>
                            </div>
                            <div class="d-flex align-items-center py-2 border-bottom" style="border-bottom-color: #f1f5f9 !important;">
                                <i class="fa-solid fa-calendar-days text-primary me-3" style="width: 16px; color: #2563eb !important;"></i>
                                <span class="text-muted me-2" style="font-size: 13px; width: 60px;">Age:</span>
                                <span class="fw-bold text-dark" id="infoAge" style="font-size: 14px;">35</span>
                            </div>
                            <div class="d-flex align-items-start py-2">
                                <i class="fa-solid fa-location-dot text-primary me-3 mt-1" style="width: 16px; color: #2563eb !important;"></i>
                                <span class="text-muted me-2" style="font-size: 13px; width: 60px;">Address:</span>
                                <span class="fw-bold text-dark flex-grow-1" id="infoAddress" style="font-size: 14px; line-height: 1.4;">Luardo Compound Purok 9 Upper Panungtungan</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT: Stats & Timeline (col-lg-7) -->
            <div class="col-lg-7">
                <!-- Stats Grid -->
                <div class="row g-3 mb-4">
                    <div class="col-4">
                        <div class="card profile-card p-3 border-0 text-white text-center h-100 shadow-sm" style="background: linear-gradient(135deg, #1e3a8a, #3b82f6); border-radius: 1.25rem;">
                            <div class="fs-4 mb-1"><i class="fa-solid fa-calendar-check opacity-75"></i></div>
                            <div class="fw-bold fs-3 mb-0" id="profileStatTotal">0</div>
                            <div class="text-xs opacity-75 fw-medium text-uppercase" style="font-size: 10px; letter-spacing: 0.5px;">Total sessions</div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card profile-card p-3 border-0 text-white text-center h-100 shadow-sm" style="background: linear-gradient(135deg, #10b981, #059669); border-radius: 1.25rem;">
                            <div class="fs-4 mb-1"><i class="fa-solid fa-circle-check opacity-75"></i></div>
                            <div class="fw-bold fs-3 mb-0" id="profileStatCompleted">0</div>
                            <div class="text-xs opacity-75 fw-medium text-uppercase" style="font-size: 10px; letter-spacing: 0.5px;">Completed</div>
                        </div>
                    </div>
                    <div class="col-4">
                        <div class="card profile-card p-3 border-0 text-white text-center h-100 shadow-sm" style="background: linear-gradient(135deg, #f59e0b, #d97706); border-radius: 1.25rem;">
                            <div class="fs-4 mb-1"><i class="fa-solid fa-clock opacity-75"></i></div>
                            <div class="fw-bold fs-3 mb-0" id="profileStatPending">0</div>
                            <div class="text-xs opacity-75 fw-medium text-uppercase" style="font-size: 10px; letter-spacing: 0.5px;">Pending / Approved</div>
                        </div>
                    </div>
                </div>

                <!-- Recent Consultations Timeline -->
                <div class="card profile-card p-4 bg-white mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-3">
                        <p class="section-title mb-0">Recent Activity Timeline</p>
                        <span class="badge bg-light text-muted fw-semibold rounded-pill px-2 py-1" style="font-size: 10px;">Real-time</span>
                    </div>
                    <div class="timeline-container position-relative" id="profileTimeline">
                        <div class="text-center py-4 text-muted small">
                            <i class="fa-solid fa-clock-rotate-left fa-spin fs-4 mb-2 d-block"></i> Loading recent activity...
                        </div>
                    </div>
                </div>

                <!-- Actions card -->
                <div class="card profile-card p-4 bg-white">
                    <p class="section-title">Quick Actions</p>
                    <div class="d-flex flex-wrap gap-3">
                        <button class="btn btn-outline-primary rounded-pill px-4 py-2 fw-bold d-flex align-items-center gap-2" id="btnShareProfile">
                            <i class="fa-solid fa-share-nodes"></i> Share Credentials
                        </button>
                        <button class="btn btn-outline-dark rounded-pill px-4 py-2 fw-bold d-flex align-items-center gap-2" id="btnPrintProfile">
                            <i class="fa-solid fa-print"></i> Export Profile Card
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- Toast -->
    <div class="toast-msg" id="toastBox" style="display:none;">
        <div class="toast show border-0 shadow-lg" id="toastEl">
            <div class="toast-body d-flex align-items-center gap-2 fw-semibold" id="toastBody"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
            }
        });
    </script>
</body>
</html>
